<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1116" />
  <meta name="description" content="Paste resume + job description, generate interview answers, listen with TTS" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Interview Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Interview Coach</h1>
        <p>粘贴简历 + JD → AI 生成回答 → 语音跟读</p>
      </div>
      <span class="badge" id="pwaBadge">PWA</span>
    </header>

    <details class="card settings" id="settingsPanel">
      <summary>⚙ API & 语音设置（首次必填）</summary>
      <div class="grid two" style="margin-top:12px">
        <div>
          <label>API Key（只存在本机 localStorage）</label>
          <input id="apiKey" type="password" placeholder="sk-... 或其它兼容 Key" autocomplete="off" />
          <label>Base URL</label>
          <input id="baseUrl" type="text" value="https://api.openai.com/v1" />
          <label>Model</label>
          <input id="model" type="text" value="gpt-4o-mini" />
        </div>
        <div>
          <label>回答语言</label>
          <select id="lang">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="both">中英双语（先中后英）</option>
          </select>
          <label>TTS 声音</label>
          <select id="voice"></select>
          <label>语速 <span id="rateLabel" class="mono">1.0</span></label>
          <input id="rate" type="range" min="0.7" max="1.3" step="0.05" value="1" />
          <p class="hint">TTS 用浏览器自带语音，无需服务器。API 只用于生成文字回答。</p>
        </div>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="btn" id="saveSettings" type="button">保存设置</button>
        <button class="btn ghost" id="testTts" type="button">试听 TTS</button>
      </div>
      <p class="status" id="settingsStatus"></p>
    </details>

    <div class="grid two" style="margin-top:14px">
      <div class="card">
        <h2>简历 / Resume</h2>
        <textarea id="resume" class="tall" placeholder="粘贴你的简历全文…"></textarea>
      </div>
      <div class="card">
        <h2>职位描述 / Job Description</h2>
        <textarea id="jd" class="tall" placeholder="粘贴 JD…"></textarea>
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <h2>可能的问题（可选）</h2>
      <textarea id="questions" placeholder="一行一个问题。可留空，让 AI 根据简历+JD 自动出题。&#10;&#10;例：&#10;请介绍一下你自己&#10;为什么换工作比较频繁？&#10;你没有当过 Service Delivery Manager，为什么合适？"></textarea>
      <div class="row" style="margin-top:12px">
        <label style="display:flex;align-items:center;gap:8px;margin:0;color:var(--text)">
          <input id="autoQuestions" type="checkbox" checked />
          若问题为空，自动生成 8 道常见题
        </label>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="btn primary" id="generate" type="button">生成面试回答</button>
        <button class="btn" id="saveDraft" type="button">保存草稿</button>
        <button class="btn ghost" id="clearQa" type="button">清空回答</button>
      </div>
      <p class="status" id="genStatus"></p>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="row" style="justify-content:space-between">
        <h2 style="margin:0">生成结果</h2>
        <span class="mono" id="qaCount" style="color:var(--muted)">0</span>
      </div>
      <div id="qaList"><p class="empty">还没有回答。填好设置与材料后点「生成面试回答」。</p></div>
    </div>

    <div class="toolbar">
      <button class="btn good" id="playAll" type="button">▶ 全部朗读</button>
      <button class="btn danger" id="stopAll" type="button">■ 停止</button>
      <button class="btn" id="exportJson" type="button">导出 JSON</button>
      <button class="btn ghost" id="installBtn" type="button" hidden>安装到主屏幕</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
